<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f97316">
<title>Rex Code AI</title><style>
:root{--bg:#0b1220;--card:#0f172a;--muted:#94a3b8;--txt:#e5e7eb;--accent:#fb923c;--accent2:#f97316}
*{box-sizing:border-box}body{margin:0;font:14px/1.5 system-ui,Segoe UI,Roboto,Helvetica,Arial;background:var(--bg);color:var(--txt)}
.wrap{max-width:420px;margin:0 auto;padding:24px}
h1{font-size:24px;margin:0 0 4px;white-space:nowrap}
.hook{color:var(--txt);font-size:14px;font-weight:600;margin:0 0 16px;line-height:1.4}
.hook .pop{color:var(--accent)}
.sub{color:var(--muted);font-size:13px;margin:0 0 16px}
input,button{height:48px;border-radius:12px;border:1px solid #1f2937;background:#0b1220;color:var(--txt);padding:0 12px;font-size:16px}
input{width:100%;min-width:0}
button{cursor:pointer;background:var(--accent);border:0;font-weight:700;font-size:14px;padding:10px 16px}
button.ghost{background:#111827;border:1px solid #374151}
.muted{color:var(--muted);font-size:12px;margin-top:8px;text-align:center}
.hidden{display:none}
.hdr{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.topbar{display:flex;justify-content:space-between;align-items:center;width:100%}
.iconbtn{width:44px;height:44px;padding:0;font-size:20px;display:grid;place-items:center}
.row{display:flex;gap:8px;align-items:center}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-top:12px}
.card{background:var(--card);border:1px solid #1f2937;border-radius:14px;padding:12px;display:flex;flex-direction:column;gap:8px}
.tag{font-size:11px;border-radius:999px;padding:2px 8px;display:inline-block;width:fit-content;font-weight:700;color:#fff} /* REFINE 1: solid badges */
.tag.fail{ background:#dc2626; }   /* solid red */
.tag.check{ background:#f59e0b; }  /* solid amber */
.tag.pass{ background:#16a34a; }   /* solid green */
label{font-size:12px;color:var(--muted);margin-top:8px;display:block}
select{height:48px;border-radius:12px;border:1px solid #1f2937;background:#0b1220;color:var(--txt);padding:0 8px;font-size:16px}
.searchrow .btn{flex:1}

/* REFINE 2: Quick Chips - smaller + darker */
#quickChips{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0 20px 0}
.quick{background:var(--accent2);color:#fff;border:none;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:600;cursor:pointer}
.quick:active{opacity:0.8}
</style></head><body>
<div class="wrap" id="lockScreen">
  <h1>Rex Code AI</h1>
  <p class="hook"><span class="pop">Stop red tags.</span> Win inspector arguments. One link for your whole crew.</p>
  <p class="sub">Enter License Key</p>
  <input id="key" placeholder="CREW-1234"/>
  <div id="waField" class="hidden">
    <label for="wa">WhatsApp # for Reports</label>
    <input id="wa" placeholder="+1 555 123 4567" type="tel"/>
    <p class="muted" style="text-align:left">US Format: +1 10 digits. Ex: +1 5551234567</p>
  </div>
  <button onclick="unlock()">Unlock</button>
  <p class="muted">SOLO = View. CREW = Copy + Rebuttal</p>
</div>

<div class="wrap hidden" id="appScreen">
  <div class="hdr">
    <div class="topbar">
      <h1>Rex Code AI</h1>
      <div class="row" id="topBtns">
        <button class="ghost" style="height:44px;padding:0 12px" onclick="logout()">Logout</button>
      </div>
    </div>
    <p class="sub">Base: 2021 IMC / 2021 IECC. 180 codes.</p>
  </div>
  
  <div class="row searchrow">
    <input id="q" placeholder="dryer, bath fan, condensate..."/>
    <select id="s"><option value="">All</option><option>FAIL</option><option>CHECK</option><option>PASS</option></select>
    <button class="btn" onclick="load()">Search</button>
  </div>

  <div id="quickChips">
  <button class="quick" onclick="quickSearch('Dryer')">Dryer</button>
  <button class="quick" onclick="quickSearch('Bath')">Bath Fan</button>
  <button class="quick" onclick="quickSearch('Condensate')">Condensate</button>
  <button class="quick" onclick="quickSearch('Flex')">Flex Duct</button>
  <button class="quick" onclick="quickSearch('Gas')">Gas</button>
  <button class="quick" onclick="quickSearch('Combustion')">Combustion</button>
  </div>

  <div id="meta" class="muted"></div>
  <div id="res" class="grid"></div>
</div>

<script>
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js");}

const lockScreen=document.getElementById("lockScreen"),appScreen=document.getElementById("appScreen");
const q=document.getElementById("q"),s=document.getElementById("s"),res=document.getElementById("res"),meta=document.getElementById("meta"),waField=document.getElementById("waField"),topBtns=document.getElementById("topBtns");
let codes=[],WA=localStorage.getItem("rexWA")||"",TIER=localStorage.getItem("rexTier")||"";

if(TIER){
  lockScreen.classList.add("hidden");appScreen.classList.remove("hidden");
}

document.getElementById("key").addEventListener("input",e=>{
  if(e.target.value.trim().toUpperCase().startsWith("CREW")){waField.classList.remove("hidden")}
  else{waField.classList.add("hidden")}
});

function quickSearch(term){
  q.value = term;
  load();
}

function formatUS(num){
  const d=num.replace(/\D/g,"");
  if(d.length===11 && d.startsWith("1")) return d;
  if(d.length===10) return "1"+d;
  return d;
}

function unlock(){
  const k=document.getElementById("key").value.trim().toUpperCase();
  const w=document.getElementById("wa").value;
  if(k==="CREW-1234"){
    const wfmt=formatUS(w);
    if(wfmt.length!==11){alert("CREW needs US WhatsApp # first. Ex: +1 5551234567");return}
    localStorage.setItem("rexWA",wfmt);WA=wfmt;TIER="CREW";
  }
  else if(k==="SOLO-1234"){TIER="SOLO"}
  else{alert("Invalid key");return}
  localStorage.setItem("rexTier",TIER);
  lockScreen.classList.add("hidden");appScreen.classList.remove("hidden");
}

function changeWA(){
  const n=prompt("New US WhatsApp # Ex: +1 5551234567");
  if(n){const wfmt=formatUS(n);if(wfmt.length===11){localStorage.setItem("rexWA",wfmt);WA=wfmt;alert("Saved")}else{alert("Enter 10 digits")}}
}
function logout(){localStorage.removeItem("rexTier");localStorage.removeItem("rexWA");location.reload()}

async function load(){
  meta.textContent="Searching...";
  try{
    const r=await fetch("codes.json",{cache:"force-cache"}); 
    codes=await r.json();
    render(filter())
  }
  catch(e){meta.textContent="Offline or Error: "+e.message}
}

function filter(){const term=q.value.toLowerCase().trim(),st=s.value;return codes.filter(c=>(!st||c.s===st)&&(!term||c.t.toLowerCase().includes(term)||c.c.toLowerCase().includes(term)||c.why.toLowerCase().includes(term)))}
function render(list){
  meta.textContent=`Found ${list.length} of ${codes.length} codes.`;
  res.innerHTML="";
  list.forEach(code=>{
    const d=document.createElement("div");d.className="card";
    let btns=`<button class="ghost" style="height:36px" onclick="copyRep('${code.rep.replace(/'/g,"\\'")}')">📋 Copy Report</button>`;
    if(TIER==="CREW"){btns+=`<button class="ghost" style="height:36px" onclick="waRebuttal('${code.c}','${code.why.replace(/'/g,"\\'")}','${code.fix.replace(/'/g,"\\'")}')">📤 Send Report</button>`}
    d.innerHTML=`<div class="tag ${code.s.toLowerCase()}">${code.s}</div>
      <h3>${code.t}</h3><div class="muted">${code.c}</div>
      <div>${code.why}</div><div><b>Fix:</b> ${code.fix}</div>
      <div class="row">${btns}</div>`;
    res.appendChild(d);
  })
}
function copyRep(t){navigator.clipboard.writeText(t);alert("Copied!")}
function waRebuttal(c,why,rep){
  if(!WA){alert("Set WhatsApp # first");return}
  const jobRef = TIER==="CREW" ? "CREW-1234" : "SOLO";
  // REFINE 3: Marketing footer added
  const txt=`*Rex Code AI Rebuttal*%0A%0A*Code Section:* ${c}%0A*Finding:* ${why}%0A*Required Fix:* ${rep}%0A%0A*Job Reference:* ${jobRef}%0A%0APowered by Rex Code AI — rex-code-ai.vercel.app`;
  window.open(`https://wa.me/${WA}?text=${txt}`,'_blank');
}
</script></body></html>
