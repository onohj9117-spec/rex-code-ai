<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Rex Code AI V1</title><style>
:root{--bg:#0b1220;--card:#0f172a;--muted:#94a3b8;--txt:#e5e7eb;--ok:#22c55e;--warn:#f59e0b;--bad:#ef4444;--accent:#3b82f6}
*{box-sizing:border-box}body{margin:0;font:14px/1.5 system-ui,Segoe UI,Roboto,Helvetica,Arial;background:var(--bg);color:var(--txt)}
.wrap{max-width:900px;margin:0 auto;padding:16px}.hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.hdr h1{font-size:18px;margin:0}.sub{color:var(--muted);font-size:12px;margin:0 0 12px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
input,select,button{height:40px;border-radius:10px;border:1px solid #1f2937;background:#0b1220;color:var(--txt);padding:0 12px}
button{cursor:pointer;background:var(--accent);border:0;font-weight:600}
button.ghost{background:#111827;border:1px solid #374151}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-top:12px}
.card{background:var(--card);border:1px solid #1f2937;border-radius:14px;padding:12px;display:flex;flex-direction:column;gap:8px}
.tag{font-size:11px;border-radius:999px;padding:2px 8px;border:1px solid #374151;display:inline-block;width:fit-content}
.fail{border-color:#7f1d1d;color:#fecaca}.check{border-color:#92400e;color:#fde68a}.pass{border-color:#14532d;color:#bbf7d0}
.muted{color:var(--muted);font-size:12px}h3{margin:0;font-size:15px}
dialog{border:1px solid #334155;background:#0f172a;color:var(--txt);border-radius:12px;padding:16px;max-width:420px}
dialog input{width:100%}
</style></head><body><div class="wrap">
  <div class="hdr">
    <h1>Rex Code AI V1</h1>
    <button class="ghost" onclick="settings.showModal()">⚙️ Settings</button>
  </div>
  <p class="sub">Base: 2021 IMC / 2024 IECC. 100 codes.</p>
  <div class="row">
    <input id="q" placeholder="Search: dryer, bath, hood, vent..."/>
    <select id="s"><option value="">All</option><option>FAIL</option><option>CHECK</option><option>PASS</option></select>
    <button onclick="load()">Load</button>
  </div>
  <div id="meta" class="muted"></div>
  <div id="res" class="grid"></div>
</div>

<dialog id="settings">
  <h3>WhatsApp Report Number</h3>
  <p class="muted">Format: 2348012345678. No + or 0.</p>
  <input id="waInput" placeholder="2348012345678"/>
  <div class="row" style="margin-top:12px">
    <button onclick="saveWA()">Save</button>
    <button class="ghost" onclick="settings.close()">Close</button>
  </div>
</dialog>

<script>
const q=document.getElementById("q"),s=document.getElementById("s"),res=document.getElementById("res"),meta=document.getElementById("meta"),settings=document.getElementById("settings"),waInput=document.getElementById("waInput");
let codes=[],WA=localStorage.getItem("rexWA")||"";

if(!WA){settings.showModal()}else{waInput.value=WA}

function saveWA(){
  const v=waInput.value.replace(/\D/g,"");
  if(v.length<10){alert("Enter full number. Ex: 2348012345678");return}
  localStorage.setItem("rexWA",v);WA=v;settings.close();
}

async function load(){
  meta.textContent="Loading...";
  try{const r=await fetch("codes.json?v="+Date.now());codes=await r.json();render(filter())}
  catch(e){meta.textContent="Error: "+e.message}
}
function filter(){const term=q.value.toLowerCase().trim(),st=s.value;return codes.filter(c=>(!st||c.s===st)&&(!term||c.t.toLowerCase().includes(term)||c.c.toLowerCase().includes(term)||c.why.toLowerCase().includes(term)))}
function render(list){
  meta.textContent=`Loaded ${codes.length} codes. Showing ${list.length}.`;
  res.innerHTML="";
  list.forEach(code=>{
    const d=document.createElement("div");d.className="card";
    d.innerHTML=`<div class="tag ${code.s.toLowerCase()}">${code.s}</div>
      <h3>${code.t}</h3><div class="muted">${code.c}</div>
      <div>${code.why}</div><div><b>Fix:</b> ${code.fix}</div>
      <div class="row">
        <button class="btn
