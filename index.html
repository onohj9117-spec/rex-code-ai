<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rex Code AI V1</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;background:#0a0a0a;color:#e5e5e5}
.wrap{max-width:600px;margin:0 auto;padding:16px}
h1{font-size:20px;margin:0 0 8px}
.sub{color:#999;font-size:12px;margin-bottom:16px}
input,button{width:100%;padding:14px;border-radius:12px;border:1px solid #222;background:#111;color:#fff;font-size:16px}
input{margin-bottom:12px}
button{background:#ff4d00;border:0;font-weight:700;cursor:pointer}
.card{border:1px solid #222;border-radius:12px;padding:14px;margin:12px 0;background:#111}
.badge{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700;margin-bottom:8px}
.FAIL{background:#3b0f0f;color:#ff6b6b}
.CHECK{background:#3b2a0f;color:#ffb86b}
.PASS{background:#0f3b1a;color:#6bff8a}
.row{display:flex;gap:8px;margin-top:8px}
.row button{padding:10px;font-size:14px}
.ghost{background:#1a1a1a;border:1px solid #333}
.hide{display:none}
.code{font-size:12px;color:#999}
.searchRow{display:flex;gap:8px;margin-bottom:12px}
.searchRow input{margin-bottom:0;flex:1}
.searchRow button{width:auto;padding:14px 18px}
</style>
</head>
<body>
<div class="wrap">
  <div id="gate">
    <h1>Rex Code AI V1</h1>
    <div class="sub">Enter License Key</div>
    <input id="key" placeholder="SOLO-XXXX or CREW-XXXX">
    <button id="unlock">Unlock</button>
    <div class="sub" style="margin-top:8px">SOLO = View. CREW = Copy + Rebuttal</div>
  </div>
  <div id="app" class="hide">
    <h1>Rex Code AI V1</h1>
    <div class="sub">Base: 2024 IMC / 2024 IECC. 100 codes.</div>
    <div class="searchRow">
      <input id="q" placeholder="Search: dryer vent, tape, clearance, MUA">
      <button id="searchBtn">Search</button>
    </div>
    <div id="list">Type and hit Search...</div>
  </div>
</div>
<script>
let CODES=[],tier=null;
const $=id=>document.getElementById(id);

fetch('codes.json')
.then(r=>{if(!r.ok) throw new Error('HTTP '+r.status); return r.json()})
.then(d=>{CODES=d;$('list').innerHTML='Loaded '+CODES.length+' codes'})
.catch(e=>{$('list').innerHTML='Error: '+e.message});

$('unlock').addEventListener('click',()=>{
  const k=$('key').value.replace(/\s/g,'').toUpperCase();
  if(k.startsWith('SOLO-')||k.startsWith('CREW-')){
    tier=k.startsWith('CREW')?'CREW':'SOLO';
    $('gate').classList.add('hide');
    $('app').classList.remove('hide');
  }else{
    alert('Invalid key. Use SOLO-XXXX or CREW-XXXX');
  }
});

$('q').addEventListener('input',render); // <-- This is the q listener
$('searchBtn').addEventListener('click',render); // <-- This is the button

function render(){
  const q=$('q').value.toLowerCase();
  const data=CODES.filter(x=>x.t.toLowerCase().includes(q)||x.c.toLowerCase().includes(q));
  $('list').innerHTML=data.map(x=>`
    <div class="card">
      <div class="badge ${x.s}">${x.s}</div>
      <div style="font-weight:700">${x.t}</div>
      <div class="code">${x.c}</div>
      <div style="margin:8px 0;color:#ccc">${x.why}</div>
      <div style="margin:8px 0"><b>Fix:</b> ${x.fix}</div>
      ${tier==='CREW'?`<div class="row"><button onclick="navigator.clipboard.writeText('${x.rep.replace(/'/g,"\\'")}')">📋 Copy Report</button><button class="ghost" onclick="alert('${x.rep.replace(/'/g,"\\'")}')">Inspector Rebuttal</button></div>`:""}
    </div>
  `).join('')||"<div class='sub'>No codes found</div>";
}
</script>
</body>
</html>
